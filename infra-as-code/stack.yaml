apiVersion: stack-cli.dev/v1
kind: StackApp
metadata:
  name: one-runtime
  namespace: one-runtime
spec:
  components:
    db: {}
  profiles:
    dev:
      components:
        ingress:
          port: 32760
        db:
          expose_db_port: 32761
          danger_override_password: testpassword
  services:
    web:
      image: mendhak/http-https-echo:latest
      port: 8080
      database_url: DATABASE_URL