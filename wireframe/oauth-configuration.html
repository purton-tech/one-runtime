<div class="page-stack">
  <section class="card">
    <div class="card-body">
      <h2 class="card-title">OAuth Configuration</h2>
      <p class="text-base-content/70 text-sm">
        Define which connection methods are allowed for this project and apply extra controls for trust-sensitive providers such as Gmail.
      </p>
    </div>
  </section>

  <div class="grid gap-6 lg:grid-cols-2">
    <section class="card">
      <div class="card-body">
        <h3 class="card-title">Connection policy</h3>
        <label class="label justify-start gap-3">
          <input type="checkbox" checked class="toggle">
          <span>Allow managed OAuth</span>
        </label>
        <label class="label justify-start gap-3">
          <input type="checkbox" checked class="toggle">
          <span>Allow customer-managed OAuth</span>
        </label>
        <label class="label justify-start gap-3">
          <input type="checkbox" checked class="toggle">
          <span>Require BYO OAuth for Gmail</span>
        </label>
        <label class="label justify-start gap-3">
          <input type="checkbox" checked class="toggle">
          <span>Restrict sensitive scopes until manually approved</span>
        </label>
      </div>
    </section>

    <section class="card">
      <div class="card-body">
        <h3 class="card-title">Scope controls</h3>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Gmail allowed scopes</legend>
          <input class="input input-bordered w-full" value="gmail.readonly, gmail.metadata, gmail.compose">
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Approval mode</legend>
          <select class="select select-bordered w-full">
            <option selected>Security review required for new sensitive scopes</option>
            <option>Project admin can self-approve</option>
            <option>Managed OAuth only</option>
          </select>
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Default consent owner</legend>
          <select class="select select-bordered w-full">
            <option>Customer-managed for sensitive providers</option>
            <option>One Runtime managed everywhere</option>
          </select>
        </fieldset>
      </div>
    </section>
  </div>
</div>
