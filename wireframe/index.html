<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>One Runtime</title>
    <link href="./dist/tailwind.css" rel="stylesheet" type="text/css">
  </head>
  <body class="min-h-screen bg-base-200">
    <div class="app-shell">
      <aside class="app-sidebar">
        <div class="app-sidebar-inner">
          <div class="border-base-300 border-b px-6 py-5">
            <div class="flex items-center gap-3">
              <div class="bg-base-300 text-base-content flex h-10 w-10 items-center justify-center rounded-box font-semibold">
                OR
              </div>
              <div>
                <p class="text-sm font-semibold">One Runtime</p>
                <p class="text-base-content/60 text-xs">OAuth platform console</p>
              </div>
            </div>
          </div>

          <div class="app-sidebar-nav">
            <ul class="menu w-full gap-1 p-0" id="menu">
              <li><a class="wireframe-link" href="?page=overview" data-page="overview">Overview</a></li>
              <li><a class="wireframe-link" href="?page=projects" data-page="projects">Projects</a></li>
              <li><a class="wireframe-link" href="?page=providers" data-page="providers">Providers</a></li>
              <li><a class="wireframe-link" href="?page=gmail-connected" data-page="gmail-connected">Connections</a></li>
              <li><a class="wireframe-link" href="?page=gmail-activity" data-page="gmail-activity">Activity</a></li>
              <li><a class="wireframe-link" href="?page=api-keys" data-page="api-keys">API Keys</a></li>
              <li><a class="wireframe-link" href="?page=oauth-configuration" data-page="oauth-configuration">Settings</a></li>
            </ul>
          </div>

          <div class="border-base-300 space-y-4 border-t px-6 py-5 text-sm">
            <a class="wireframe-link link block" href="?page=how-connections-work" data-page="how-connections-work">How connections work</a>
            <a class="wireframe-link link block" href="?page=provider-required" data-page="provider-required">Blocked flow example</a>
            <div class="pt-4">
              <p class="font-medium">Project: Acme Agent Cloud</p>
              <p class="text-base-content/70 text-xs">Managed OAuth enabled for evaluation, BYO required for Gmail in production</p>
            </div>
          </div>
        </div>
      </aside>

      <main class="app-main">
        <header class="border-base-300 bg-base-100 border-b px-6 py-5">
          <div class="flex min-h-10 flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
              <h1 id="page-title" class="text-2xl font-semibold">Overview</h1>
            </div>
            <div id="page-actions" class="flex min-h-10 items-center gap-3"></div>
          </div>
        </header>

        <section class="section-padding">
          <div id="router-error" class="alert alert-error mb-4 hidden"></div>
          <div id="page-content" class="page-stack"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
