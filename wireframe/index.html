<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wireframe Starter</title>
    <link href="./dist/tailwind.css" rel="stylesheet" type="text/css">
  </head>
  <body class="min-h-screen bg-base-200">
    <div class="app-shell">
      <aside class="app-sidebar">
        <div class="app-sidebar-inner">
          <div class="border-base-300 border-b px-6 py-5">
            <div class="flex items-center gap-3">
              <div class="bg-primary text-primary-content flex h-10 w-10 items-center justify-center rounded-box">
                WS
              </div>
              <div>
                <p class="text-sm font-semibold">Wireframe Starter</p>
              </div>
            </div>
          </div>

          <div class="app-sidebar-nav">
            <ul class="menu w-full gap-1 p-0" id="menu">
              <li><a class="wireframe-link" href="?page=overview" data-page="overview">Overview</a></li>
              <li><a class="wireframe-link" href="?page=items" data-page="items">Items</a></li>
              <li><a class="wireframe-link" href="?page=item-detail" data-page="item-detail">Item Detail</a></li>
              <li><a class="wireframe-link" href="?page=empty-state" data-page="empty-state">Empty State</a></li>
              <li><a class="wireframe-link" href="?page=settings" data-page="settings">Settings</a></li>
            </ul>
          </div>

          <div class="border-base-300 space-y-4 border-t px-6 py-5 text-sm">
            <a class="link block" href="#">Project notes</a>
            <a class="link block" href="#">Open questions</a>
            <div class="pt-4">
              <p class="font-medium">Template workspace</p>
              <p class="text-base-content/70 text-xs">Replace this with project-specific context</p>
            </div>
          </div>
        </div>
      </aside>

      <main class="app-main">
        <header class="border-base-300 bg-base-100 border-b px-6 py-5">
          <div class="flex min-h-10 flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
              <h1 id="page-title" class="text-2xl font-semibold">Overview</h1>
            </div>
            <div id="page-actions" class="flex min-h-10 items-center gap-3"></div>
          </div>
        </header>

        <section class="section-padding">
          <div id="router-error" class="alert alert-error mb-4 hidden"></div>
          <div id="page-content" class="page-stack"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
