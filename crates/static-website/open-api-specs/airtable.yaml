components:
  schemas:
    Base:
      properties:
        id:
          type: "string"
        name:
          type: "string"
        permissionLevel:
          type: "string"
      required:
        - "id"
        - "name"
      type: "object"
    Comment:
      properties:
        createdTime:
          format: "date-time"
          type: "string"
        id:
          type: "string"
        text:
          type: "string"
        userId:
          type: "string"
      required:
        - "id"
        - "text"
      type: "object"
    Record:
      properties:
        createdTime:
          format: "date-time"
          type: "string"
        fields:
          additionalProperties: true
          type: "object"
        id:
          type: "string"
      required:
        - "id"
        - "fields"
      type: "object"
  securitySchemes:
    oauth2:
      flows:
        authorizationCode:
          authorizationUrl: "https://airtable.com/oauth2/v1/authorize"
          scopes:
            data.recordComments:read: "See comments in records"
            data.records:read: "See the data in records"
            schema.bases:read: "See information about bases"
          tokenUrl: "https://airtable.com/oauth2/v1/token"
      type: "oauth2"
info:
  description: "API for viewing Airtable records and record comments using OAuth2."
  title: "Airtable Records & Comments API"
  version: "1.0.0"
  x-bionic-slug: "airtable"
  x-logo:
    url: "data:image/svg+xml;base64,"
openapi: "3.0.3"
paths:
  /meta/bases:
    get:
      operationId: "listBases"
      responses:
        200:
          content:
            application/json:
              schema:
                properties:
                  bases:
                    items:
                      $ref: "#/components/schemas/Base"
                    type: "array"
                type: "object"
          description: "List of bases"
      security:
        - oauth2:
            - "data.bases:read"
      summary: "List available bases"
  /{tableName}/records:
    get:
      operationId: "listRecords"
      parameters:
        - in: "path"
          name: "tableName"
          required: true
          schema:
            type: "string"
      responses:
        200:
          content:
            application/json:
              schema:
                properties:
                  records:
                    items:
                      $ref: "#/components/schemas/Record"
                    type: "array"
                type: "object"
          description: "List of records"
      security:
        - oauth2:
            - "data.records:read"
      summary: "List records"
  /{tableName}/records/{recordId}:
    get:
      operationId: "getRecord"
      parameters:
        - in: "path"
          name: "tableName"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "recordId"
          required: true
          schema:
            type: "string"
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Record"
          description: "Single record retrieved"
      security:
        - oauth2:
            - "data.records:read"
      summary: "Retrieve a record"
  /{tableName}/records/{recordId}/comments:
    get:
      operationId: "listRecordComments"
      parameters:
        - in: "path"
          name: "tableName"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "recordId"
          required: true
          schema:
            type: "string"
      responses:
        200:
          content:
            application/json:
              schema:
                properties:
                  comments:
                    items:
                      $ref: "#/components/schemas/Comment"
                    type: "array"
                type: "object"
          description: "List of comments"
      security:
        - oauth2:
            - "data.recordComments:read"
      summary: "List comments on a record"
security:
  - oauth2:
      - "data.records:read"
      - "data.recordComments:read"
      - "data.bases:read"
servers:
  - url: "https://api.airtable.com/v0"
    variables:
      baseId:
        default: "app1234567890"
        description: "The ID of the Airtable base"
