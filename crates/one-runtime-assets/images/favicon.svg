<svg width="500" height="450" viewBox="170 50 150 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="deepRedGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff3336" /> <stop offset="100%" stop-color="#d41a1a" /> </radialGradient>
    
    <linearGradient id="tentacleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d41a1a" />
      <stop offset="100%" stop-color="#a60c0d" />
    </linearGradient>

    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccffff" />
      <stop offset="40%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#008080" />
    </radialGradient>
  </defs>

  <g stroke="#8e0e11" stroke-width="3">
    <ellipse cx="160" cy="270" rx="18" ry="40" fill="url(#tentacleGrad)" transform="rotate(55 160 270)" />
    <ellipse cx="185" cy="310" rx="18" ry="45" fill="url(#tentacleGrad)" transform="rotate(30 185 310)" />
    <ellipse cx="225" cy="330" rx="18" ry="45" fill="url(#tentacleGrad)" transform="rotate(10 225 330)" />

    <ellipse cx="340" cy="270" rx="18" ry="40" fill="url(#tentacleGrad)" transform="rotate(-55 340 270)" />
    <ellipse cx="315" cy="310" rx="18" ry="45" fill="url(#tentacleGrad)" transform="rotate(-30 315 310)" />
    <ellipse cx="275" cy="330" rx="18" ry="45" fill="url(#tentacleGrad)" transform="rotate(-10 275 330)" />
  </g>

  <g fill="none" stroke-linecap="round">
    <g stroke="#8e0e11" stroke-width="18">
      <path d="M205,110 Q180,50 160,70" />
      <path d="M295,110 Q320,50 340,70" />
    </g>
    <g stroke="#d41a1a" stroke-width="12">
      <path d="M205,110 Q180,50 160,70" />
      <path d="M295,110 Q320,50 340,70" />
    </g>
  </g>

  <g stroke="#8e0e11" stroke-width="4">
    <circle cx="150" cy="200" r="45" fill="url(#deepRedGrad)" />
    <circle cx="350" cy="200" r="45" fill="url(#deepRedGrad)" />
  </g>

  <circle cx="250" cy="200" r="120" 
          fill="url(#deepRedGrad)" 
          stroke="#8e0e11" 
          stroke-width="4" />

  <g>
    <circle cx="200" cy="180" r="35" fill="#111" />
    <circle cx="200" cy="180" r="12" fill="url(#eyeGlow)" />
    <circle cx="300" cy="180" r="35" fill="#111" />
    <circle cx="300" cy="180" r="12" fill="url(#eyeGlow)" />
